<!-- PRODUCT DETAIL -->
<div class="product-detail" id="product-detail">
  <div class="loading-spinner"><div class="spinner"></div></div>
</div>

  </div>

    <p>&copy; 2026 SunTrade. <span data-i18n="footer_rights">All rights reserved.</span></p>

<script src="/js/i18n.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/supabase-client.js"></script>
<script>
  let currentProduct = null;
  let currentImageIndex = 0;

  document.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    if (!productId) { window.location.href = '/catalog.html'; return; }

    setTimeout(async () => {
      if (!supabase) return;
      currentProduct = await getProduct(productId);
      if (!currentProduct) {
        document.getElementById('product-detail').innerHTML = '<div style="text-align:center;padding:4rem;"><h2>Product not found</h2><a href="/catalog.html" style="color:var(--primary);">Back to catalog</a></div>';
        return;
      }
      renderProduct();
    }, 500);
  });

  function renderProduct() {
    const p = currentProduct;
    const name = p['name_' + currentLang] || p.name_en || 'Product';
    const desc = p['desc_' + currentLang] || p.desc_en || '';
    const images = p.images && p.images.length ? p.images : ['/images/placeholder.jpg'];
    const inStock = p.stock > 0;

    // Update page title and meta
    document.title = name + ' - SunTrade';
    const meta = document.querySelector('meta[name="description"]');
    if (meta) meta.content = desc.substring(0, 160);

    // Update OG tags for sharing
    const ogTitle = document.createElement('meta');
    ogTitle.setAttribute('property', 'og:title');
    ogTitle.content = name;
    document.head.appendChild(ogTitle);
    const ogImage = document.createElement('meta');
    ogImage.setAttribute('property', 'og:image');
    ogImage.content = images[0];
    document.head.appendChild(ogImage);

    document.getElementById('product-detail').innerHTML = `
      <div class="product-gallery">
        <div class="gallery-main">
          <img id="main-image" src="${images[0]}" alt="${name}">
        </div>
        ${images.length > 1 ? `
        <div class="gallery-thumbs">
          ${images.map((img, i) => `
            <div class="gallery-thumb ${i === 0 ? 'active' : ''}" onclick="setMainImage(${i})">
              <img src="${img}" alt="${name}">
            </div>
          `).join('')}
        </div>
        ` : ''}
      </div>
      <div class="product-info">
        <h1 id="product-name">${name}</h1>
        <div class="product-price-detail">&euro;${parseFloat(p.price).toFixed(2)}</div>
        <span class="product-stock ${inStock ? 'in-stock' : 'out-of-stock'}">
          ${inStock ? t('product_in_stock') : t('product_out_of_stock')}
        </span>
        ${inStock ? `
        <div class="product-qty">
          <label data-i18n="product_quantity">Quantity:</label>
          <div class="qty-control">
            <button onclick="changeQty(-1)">-</button>
            <input type="number" id="qty-input" value="1" min="1" max="${p.stock}">
            <button onclick="changeQty(1)">+</button>
          </div>
        </div>
        <div class="product-actions">
          <button class="btn-add-cart" onclick="addProductToCart()" data-i18n="product_add_cart">Add to Cart</button>
          <button class="btn-buy-now" onclick="buyNow()" data-i18n="product_buy_now">Buy Now</button>
          <button class="btn-share" onclick="shareProduct()" title="Share">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          </button>
        </div>
        ` : ''}
        <div class="product-desc">
          <h3 data-i18n="product_description">Description</h3>
          <p>${desc || 'No description available.'}</p>
        </div>
      </div>
    `;

    // Setup gallery zoom
    const mainImg = document.getElementById('main-image');
    if (mainImg) {
      mainImg.addEventListener('click', () => {
        if (mainImg.style.transform === 'scale(1.5)') {
          mainImg.style.transform = 'scale(1)';
          mainImg.style.cursor = 'zoom-in';
        } else {
          mainImg.style.transform = 'scale(1.5)';
          mainImg.style.cursor = 'zoom-out';
        }
        mainImg.style.transition = 'transform 0.3s';
      });
    }
  }

  function setMainImage(index) {
    const images = currentProduct.images || [];
    document.getElementById('main-image').src = images[index];
    document.querySelectorAll('.gallery-thumb').forEach((t, i) => t.classList.toggle('active', i === index));
    currentImageIndex = index;
  }

  function changeQty(delta) {
    const input = document.getElementById('qty-input');
    const newVal = Math.max(1, Math.min(parseInt(input.value) + delta, currentProduct.stock));
    input.value = newVal;
  }

  function addProductToCart() {
    const name = currentProduct['name_' + currentLang] || currentProduct.name_en;
    const img = (currentProduct.images && currentProduct.images[0]) || '/images/placeholder.jpg';
    const qty = parseInt(document.getElementById('qty-input').value);
    addToCart(currentProduct.id, name, currentProduct.price, img, qty);
  }

  function buyNow() {
    addProductToCart();
    window.location.href = '/cart.html';
  }

  function shareProduct() {
    const url = window.location.href;
    if (navigator.share) {
      navigator.share({ title: document.getElementById('product-name').textContent, url });
    } else {
      navigator.clipboard.writeText(url);
      showNotification('Link copied!');
    }
  }
</script>
</body>
</html>
