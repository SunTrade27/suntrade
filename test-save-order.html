<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Save Order</title>
</head>
<body>
  <h1>Test Save Order Endpoint</h1>
  <p>Stripe-тен кейін тапсырысты қолмен сақтау үшін session_id енгізіңіз:</p>
  <input type="text" id="session-id" placeholder="cs_test_..." style="width:500px;padding:8px;">
  <button onclick="testSave()" style="padding:8px 16px;">Save Order</button>
  <pre id="result" style="margin-top:20px;padding:16px;background:#f5f5f5;border-radius:8px;white-space:pre-wrap;"></pre>

  <script>
    async function testSave() {
      const sessionId = document.getElementById('session-id').value.trim();
      const resultEl = document.getElementById('result');
      if (!sessionId) {
        resultEl.textContent = 'Session ID керек';
        return;
      }
      resultEl.textContent = 'Сақталуда...';
      try {
        const resp = await fetch('/api/save-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId })
        });
        const data = await resp.json();
        resultEl.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        resultEl.textContent = 'Қателік: ' + err.message;
      }
    }
  </script>
</body>
</html>
