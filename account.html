<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="account_title">My Account - SunTrade</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/icons.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="logo">Sun<span>Trade</span></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="/" data-i18n="nav_home">Home</a></li>
      <li><a href="/catalog.html" data-i18n="nav_catalog">Catalog</a></li>
      <li><a href="/cart.html" data-i18n="nav_cart">Cart</a></li>
    </ul>
    <div class="nav-right">
      <div class="lang-wrapper">
        <button id="lang-toggle"><svg class="icon icon-md" style="vertical-align:middle"><use href="#icon-globe"/></svg> EN</button>
        <div id="lang-dropdown"></div>
      </div>
      <a href="/cart.html" class="cart-link">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        <span id="cart-badge">0</span>
      </a>
      <div id="user-menu-container"></div>
      <button class="mobile-menu-btn" onclick="document.getElementById('nav-links').classList.toggle('show')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>
</nav>

<!-- LOADING -->
<div id="account-loading" style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
  <div class="spinner"></div>
</div>

<!-- NOT LOGGED IN -->
<div id="account-not-logged" style="display:none;text-align:center;padding:4rem 1rem;">
  <svg class="icon icon-xxl" style="color:var(--text-muted);margin-bottom:1rem;"><use href="#icon-user"/></svg>
  <h2 data-i18n="auth_signin_required">Please sign in to view your account</h2>
  <a href="/auth.html" class="btn-pay" style="display:inline-block;margin-top:1rem;" data-i18n="auth_signin">Sign In</a>
</div>

<!-- ACCOUNT PANEL -->
<div id="account-panel" class="account-layout" style="display:none;">

  <!-- Sidebar -->
  <aside class="account-sidebar">
    <div class="account-avatar" id="account-avatar" style="position:relative;cursor:pointer;" onclick="document.getElementById('avatar-upload-input').click();">
      <span id="avatar-letter">?</span>
      <img id="avatar-img" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;position:absolute;top:0;left:0;">
      <div class="avatar-overlay" id="avatar-overlay">
        <svg class="icon icon-md" style="color:white;"><use href="#icon-camera"/></svg>
      </div>
    </div>
    <input type="file" id="avatar-upload-input" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)">
    <h3 id="account-display-name">User</h3>
    <p id="account-display-email" style="color:var(--text-light);font-size:0.85rem;">-</p>
    <nav class="account-nav">
      <a href="#" class="active" data-section="profile" onclick="showAccountSection('profile', event)" data-i18n="account_profile">Profile</a>
      <a href="#" data-section="orders" onclick="showAccountSection('orders', event)" data-i18n="account_orders">My Orders</a>
      <a href="#" data-section="settings" onclick="showAccountSection('settings', event)" data-i18n="account_settings">Settings</a>
      <a href="#" onclick="handleAccountLogout()" data-i18n="auth_logout">Logout</a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="account-main">
    <!-- Profile Section -->
    <div id="section-profile">
      <h2 data-i18n="account_profile">Profile</h2>
      <form id="profile-form" onsubmit="handleSaveProfile(event)" style="margin-top:1.5rem;max-width:520px;">
        <div class="form-group">
          <label data-i18n="auth_full_name">Full Name</label>
          <input type="text" id="profile-name" required>
        </div>
        <div class="form-group">
          <label data-i18n="auth_email">Email</label>
          <input type="email" id="profile-email" readonly style="background:#f5f5f5;">
        </div>
        <div class="form-group">
          <label><svg class="icon icon-sm" style="vertical-align:middle;margin-right:4px;"><use href="#icon-globe"/></svg> <span data-i18n="auth_country">Country / Ел / Страна</span></label>
          <select id="profile-country">
            <option value="">--</option>
            <option value="KZ">🇰🇿 Қазақстан</option>
            <option value="RU">🇷🇺 Россия</option>
            <option value="GB">🇬🇧 United Kingdom</option>
            <option value="DE">🇩🇪 Deutschland</option>
            <option value="FR">🇫🇷 France</option>
            <option value="ES">🇪🇸 España</option>
            <option value="IT">🇮🇹 Italia</option>
            <option value="TR">🇹🇷 Türkiye</option>
            <option value="PT">🇵🇹 Portugal</option>
            <option value="NL">🇳🇱 Nederland</option>
            <option value="PL">🇵🇱 Polska</option>
            <option value="SA">🇸🇦 العربية</option>
          </select>
        </div>
        <p id="profile-success" class="auth-success"></p>
        <p id="profile-error" class="auth-error"></p>
        <button type="submit" class="btn-pay" style="max-width:200px;" data-i18n="account_save">Save Changes</button>
      </form>
    </div>

    <!-- Orders Section -->
    <div id="section-orders" style="display:none;">
      <h2 data-i18n="account_orders">My Orders</h2>
      <div id="user-orders-table" style="margin-top:1.5rem;"></div>
    </div>

    <!-- Settings Section -->
    <div id="section-settings" style="display:none;">
      <h2 data-i18n="account_settings">Settings</h2>
      <div style="margin-top:1.5rem;">
        <div style="background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;">
          <h3 data-i18n="account_change_password" style="margin-bottom:1rem;">Change Password</h3>
          <form id="password-form" onsubmit="handlePasswordChange(event)">
            <div class="form-group">
              <label data-i18n="account_new_password">New Password</label>
              <input type="password" id="new-password" minlength="6">
            </div>
            <div class="form-group">
              <label data-i18n="auth_confirm_password">Confirm Password</label>
              <input type="password" id="confirm-password" minlength="6">
            </div>
            <p id="password-error" class="auth-error"></p>
            <p id="password-success" class="auth-success"></p>
            <button type="submit" class="btn-pay" style="max-width:200px;" data-i18n="account_change_password_btn">Change Password</button>
          </form>
        </div>
        <div style="background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;">
          <h3 style="color:var(--danger);margin-bottom:1rem;" data-i18n="account_danger_zone">Danger Zone</h3>
          <button class="btn-sm btn-danger" onclick="handleDeleteAccount()" data-i18n="account_delete">Delete Account</button>
        </div>
      </div>
    </div>

    <!-- Admin Section -->
  </main>
</div>

<script src="/js/i18n.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/user-menu.js"></script>
<script>
  let userProfile = null;

  document.addEventListener('DOMContentLoaded', async () => {
    setTimeout(async () => {
      // ============================================================
      // 0) Пароль қалпына келтіру сілтемесінен келдік пе?
      //    URL hash-та access_token бар болса — бұл Supabase-тен келген
      //    recovery сілтемесі. Баптаулар бетін ашып, "Жаңа пароль орнату"
      //    формасын көрсету керек.
      // ============================================================
      const isRecoveryFlow = window.location.hash &&
        (window.location.hash.includes('access_token') ||
         window.location.hash.includes('type=recovery') ||
         window.location.hash.includes('error_description'));

      // ============================================================
      // 1) Ең алдымен — Stripe-тан кейін келсек, save-order-ды МІНДЕТТІ ТҮРДЕ шақырамыз
      //    (логин болса да, болмаса да — webhook өткізбеген жағдайда кепілдік)
      // ============================================================
      const params = new URLSearchParams(window.location.search);
      let sessionId = params.get('session_id');
      if (!sessionId) {
        sessionId = localStorage.getItem('suntrade_last_session_id');
      }
      const isSuccessReturn = params.get('success') === 'true' && sessionId;

      if (isSuccessReturn) {
        // Логин күтусіз — save-order API-ға тікелей шақыру (service_key арқылы жұмыс істейді)
        try {
          console.log('[account] Saving order from Stripe session:', sessionId);
          const saveResp = await fetch('/api/save-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId })
          });
          const saveResult = await saveResp.json();
          console.log('[account] Save order result:', saveResult);
          localStorage.removeItem('suntrade_last_session_id');
          localStorage.removeItem('suntrade_last_session_email');
          // Save result-ты sessionStorage-та сақтау — account panel ашылғанда көрсету үшін
          sessionStorage.setItem('suntrade_last_save_result', JSON.stringify(saveResult));
        } catch (e) {
          console.error('[account] Save order error:', e);
          sessionStorage.setItem('suntrade_last_save_result', JSON.stringify({ error: e.message }));
        }
      }

      // ============================================================
      // 2) Supabase тексеру — логин бе?
      // ============================================================
      if (!sb) {
        document.getElementById('account-loading').style.display = 'none';
        if (isSuccessReturn) {
          // Логинсіз, бірақ төлемнен кейін келдік — success хабарламасын көрсету
          showGuestSuccessView(sessionId);
        } else {
          document.getElementById('account-not-logged').style.display = 'block';
        }
        return;
      }

      const user = await getCurrentUser();
      if (!user) {
        document.getElementById('account-loading').style.display = 'none';
        if (isSuccessReturn) {
          // Логинсіз, бірақ төлемнен кейін келдік — success хабарламасын көрсету
          showGuestSuccessView(sessionId);
        } else {
          document.getElementById('account-not-logged').style.display = 'block';
        }
        return;
      }

      userProfile = await getUserProfile();
      document.getElementById('account-loading').style.display = 'none';
      document.getElementById('account-panel').style.display = 'grid';

      // Fill profile data
      if (userProfile) {
        const displayName = userProfile.full_name || 'User';
        const displayEmail = userProfile.email || user.email || '';
        const avatarUrl = userProfile.avatar_url || '';

        // Avatar
        if (avatarUrl) {
          document.getElementById('avatar-letter').style.display = 'none';
          const imgEl = document.getElementById('avatar-img');
          imgEl.src = avatarUrl;
          imgEl.style.display = 'block';
        } else {
          document.getElementById('avatar-letter').textContent = (userProfile.full_name || displayEmail || '?')[0].toUpperCase();
        }

        document.getElementById('account-display-name').textContent = displayName;
        document.getElementById('account-display-email').textContent = displayEmail;
        document.getElementById('profile-name').value = userProfile.full_name || '';
        document.getElementById('profile-email').value = displayEmail;
        document.getElementById('profile-country').value = userProfile.country || '';
      }

      // ============================================================
      // 3) Логин болған жағдайда — orders секциясын ашу + тапсырысты жүктеу
      // ============================================================
      if (isRecoveryFlow) {
        // Пароль қалпына келтіру сілтемесінен келдік — баптаулар бетін ашып,
        // access_token-ды URL-ден тазалау
        showAccountSection('settings', null);
        showRecoveryBanner();
        // Hash-ты access_token-сыз қалдыру, reload болса қайта кірмесін
        history.replaceState(null, '', window.location.pathname + '#settings');
      } else if (window.location.hash === '#orders' || isSuccessReturn) {
        showAccountSection('orders', null);
      }
    }, 500);
  });

  // Логинсіз төлемнен кейін — success хабарламасын көрсету
  function showGuestSuccessView(sessionId) {
    const saveResult = sessionStorage.getItem('suntrade_last_save_result');
    let resultMsg = '';
    if (saveResult) {
      try {
        const r = JSON.parse(saveResult);
        if (r.success) {
          resultMsg = `<p style="color:#22C55E;margin:0.5rem 0;display:inline-flex;align-items:center;gap:0.4rem;"><svg class="icon icon-sm" style="color:#22C55E;"><use href="#icon-check-circle"/></svg> Тапсырыс сәтті сақталды!</p>`;
        } else if (r.error) {
          resultMsg = `<p style="color:#EF4444;margin:0.5rem 0;display:inline-flex;align-items:center;gap:0.4rem;"><svg class="icon icon-sm" style="color:#EF4444;"><use href="#icon-alert"/></svg> Қателік: ${escHtml(r.error)}</p>`;
        }
      } catch (e) {}
    }
    const lang = (typeof currentLang !== 'undefined' ? currentLang : 'en');
    const messages = {
      kz: 'Төлеміңіз сәтті өтті! Тапсырысыңыз қабылданды. Электрондық поштаңызға растау жіберілді.',
      ru: 'Ваш платёж прошёл успешно! Заказ принят. На вашу почту отправлено подтверждение.',
      en: 'Payment successful! Your order has been received. A confirmation email has been sent.',
      de: 'Zahlung erfolgreich! Ihre Bestellung wurde erhalten. Eine Bestätigung wurde per E-Mail gesendet.',
      fr: 'Paiement réussi ! Votre commande a été reçue. Un email de confirmation a été envoyé.',
      es: '¡Pago exitoso! Tu pedido ha sido recibido. Se ha enviado un email de confirmación.',
      it: 'Pagamento riuscito! Il tuo ordine è stato ricevuto. Una email di conferma è stata inviata.',
      tr: 'Ödeme başarılı! Siparişiniz alındı. Onay e-postası gönderildi.',
      pt: 'Pagamento bem-sucedido! Seu pedido foi recebido. Um e-mail de confirmação foi enviado.',
      nl: 'Betaling geslaagd! Uw bestelling is ontvangen. Een bevestigingsmail is verzonden.',
      pl: 'Płatność udana! Twoje zamówienie zostało przyjęte. Wysłano e-mail z potwierdzeniem.',
      ar: 'تمت العملية بنجاح! تم استلام طلبك. تم إرسال بريد إلكتروني للتأكيد.'
    };
    const msg = messages[lang] || messages.en;
    const signInHtml = (lang === 'kz' || lang === 'ru') ?
      `<p style="margin-top:1.5rem;color:var(--text-light);">Тапсырысыңызды көру үшін <a href="/auth.html" style="color:var(--primary);font-weight:600;">аккаунтқа кіріңіз</a> немесе тіркеліңіз (дәл сол email-мен).</p>` :
      `<p style="margin-top:1.5rem;color:var(--text-light);">To view your order, <a href="/auth.html" style="color:var(--primary);font-weight:600;">sign in</a> or create an account with the same email.</p>`;

    document.getElementById('account-not-logged').innerHTML = `
      <div style="max-width:520px;margin:0 auto;background:var(--bg-white);border:1px solid var(--border);border-radius:16px;padding:2rem;text-align:center;">
        <div style="width:80px;height:80px;background:#DCFCE7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2 style="margin:0 0 0.5rem;color:#1A1A2E;">${msg}</h2>
        ${resultMsg}
        <p style="margin:0.5rem 0;color:var(--text-light);font-size:0.9rem;font-family:monospace;">Session: ${escHtml(sessionId.substring(0, 24))}...</p>
        ${signInHtml}
        <a href="/" style="display:inline-block;margin-top:1.5rem;color:var(--text-light);text-decoration:underline;">← Басты бет / Home</a>
      </div>
    `;
    document.getElementById('account-not-logged').style.display = 'block';
  }

  function showAccountSection(name, e) {
    ['profile', 'orders', 'settings'].forEach(s => {
      const el = document.getElementById('section-' + s);
      if (el) el.style.display = s === name ? 'block' : 'none';
    });
    document.querySelectorAll('.account-nav a').forEach(a => a.classList.remove('active'));
    // e.target — кейде анықталмаған (программалық шақыру кезінде),
    // сондықтан data-section арқылы да іздеп көреміз
    let activeEl = (e && e.target) ? e.target : null;
    if (!activeEl || !activeEl.classList) {
      activeEl = document.querySelector('.account-nav a[data-section="' + name + '"]');
    }
    if (activeEl && activeEl.classList) {
      activeEl.classList.add('active');
    }
    if (name === 'orders') loadUserOrders();
  }

  function getOrderStatusLabel(status) {
    const key = 'order_status_' + status;
    if (typeof t === 'function' && translations && translations[key]) {
      return translations[key];
    }
    return status;
  }

  function getOrderStatusIcon(status) {
    // Сайттың өз SVG иконкалары (эмодзи емес)
    const icons = {
      'pending':   '<svg class="icon icon-sm"><use href="#icon-clock"/></svg>',
      'accepted':  '<svg class="icon icon-sm"><use href="#icon-check"/></svg>',
      'packing':   '<svg class="icon icon-sm"><use href="#icon-package"/></svg>',
      'shipped':   '<svg class="icon icon-sm"><use href="#icon-truck"/></svg>',
      'delivered': '<svg class="icon icon-sm"><use href="#icon-check-circle"/></svg>'
    };
    return icons[status] || '<svg class="icon icon-sm"><use href="#icon-clock"/></svg>';
  }

  async function loadUserOrders() {
    const container = document.getElementById('user-orders-table');
    container.innerHTML = '<p style="color:var(--text-light);">Loading...</p>';

    const orders = await getUserOrders();
    if (!orders || orders.length === 0) {
      container.innerHTML = '<p style="color:var(--text-light);">' + (t('account_no_orders') || 'No orders yet.') + '</p>';
      return;
    }

    container.innerHTML = '<div class="orders-wrap">' + orders.map(o => {
      const statusSteps = ['pending', 'accepted', 'packing', 'shipped', 'delivered'];
      const currentStep = statusSteps.indexOf(o.status);
      // Қауіпсіз мән — белгісіз статус жағдайында 0 деп есептейміз
      const safeStep = currentStep < 0 ? 0 : currentStep;

      // Build product list (from order_items or fallback to products)
      let productsHtml = '';
      if (o.order_items && o.order_items.length > 0) {
        productsHtml = o.order_items.map(item => `
          <div class="order-item">
            ${item.product_image
              ? `<img src="${escHtml(item.product_image)}" class="order-item-img" alt="${escHtml(item.product_name || '')}" loading="lazy">`
              : '<div class="order-item-img"></div>'}
            <div class="order-item-info">
              <div class="order-item-name">${escHtml(item.product_name || 'Product')}</div>
              <div class="order-item-meta">${t('qty_label') || 'Qty'}: ${item.quantity} × &euro;${parseFloat(item.unit_price || 0).toFixed(2)}</div>
            </div>
            <div class="order-item-price">&euro;${(parseFloat(item.unit_price || 0) * (item.quantity || 1)).toFixed(2)}</div>
          </div>
        `).join('');
      } else if (o.products) {
        // Fallback: single product
        const productName = o.products['name_' + currentLang] || o.products.name_en || 'N/A';
        const productImage = (o.products.images && o.products.images[0]) || '';
        productsHtml = `
          <div class="order-item">
            ${productImage ? `<img src="${escHtml(productImage)}" class="order-item-img" alt="${escHtml(productName)}" loading="lazy">` : '<div class="order-item-img"></div>'}
            <div class="order-item-info">
              <div class="order-item-name">${escHtml(productName)}</div>
            </div>
            <div class="order-item-price">&euro;${parseFloat(o.amount || 0).toFixed(2)}</div>
          </div>
        `;
      } else {
        productsHtml = '<div style="color:var(--text-light);font-size:0.85rem;padding:0.5rem 0;">' + (t('product_info_unavailable') || 'Product info unavailable') + '</div>';
      }

      // Shipping address
      const shippingHtml = o.shipping_address_line1 ? `
        <div class="order-shipping">
          <svg class="icon icon-sm"><use href="#icon-truck"/></svg>
          <div><strong>${t('order_shipping_to') || 'Shipping to'}:</strong> ${escHtml(o.shipping_address_line1)}${o.shipping_address_line2 ? ', ' + escHtml(o.shipping_address_line2) : ''}, ${escHtml(o.shipping_city || '')}${o.shipping_postal_code ? ' ' + escHtml(o.shipping_postal_code) : ''}, ${escHtml(o.shipping_country || '')}</div>
        </div>
      ` : '';

      // Vertical stepper (mobile-first), with pulsing current step
      const stepperHtml = `
        <div class="order-stepper">
          <div class="order-stepper-track"></div>
          <div class="order-stepper-fill" style="height: 0;"></div>
          ${statusSteps.map((step, i) => {
            let stepClass = '';
            if (i < safeStep) stepClass = 'done';
            else if (i === safeStep) stepClass = 'current';
            let dotContent = (i + 1);
            if (i < safeStep) {
              dotContent = '<svg class="icon icon-sm" style="color:white;width:12px;height:12px;"><use href="#icon-check"/></svg>';
            } else if (i === safeStep) {
              dotContent = getOrderStatusIcon(step).replace('<svg class="icon icon-sm">', '<svg class="icon icon-sm" style="color:white;width:12px;height:12px;">');
            }
            return `
              <div class="order-step ${stepClass}">
                <div class="order-step-dot">${dotContent}</div>
                <div class="order-step-label">${getOrderStatusLabel(step)}</div>
              </div>
            `;
          }).join('')}
        </div>
      `;

      return `
        <div class="order-card">
          <div class="order-card-head">
            <div class="order-meta">
              <span class="order-id">#${o.id.substring(0, 8).toUpperCase()}</span>
              <span class="order-date">${new Date(o.created_at).toLocaleDateString()}</span>
            </div>
            <span class="order-total">&euro;${parseFloat(o.amount || 0).toFixed(2)}</span>
          </div>
          <div>${productsHtml}</div>
          ${stepperHtml}
          ${shippingHtml}
        </div>
      `;
    }).join('') + '</div>';

    // Stepper-дің fill сызығының биіктігін орнат (мобильді вертикальды stepper)
    requestAnimationFrame(() => {
      container.querySelectorAll('.order-card').forEach(card => {
        const fill = card.querySelector('.order-stepper-fill');
        const track = card.querySelector('.order-stepper-track');
        if (fill && track) {
          fill.style.height = track.offsetHeight + 'px';
        }
      });
    });
  }

  async function handleSaveProfile(e) {
    e.preventDefault();
    const errEl = document.getElementById('profile-error');
    const succEl = document.getElementById('profile-success');
    errEl.style.display = 'none';
    succEl.style.display = 'none';

    try {
      const updated = await updateUserProfile({
        full_name: document.getElementById('profile-name').value,
        country: document.getElementById('profile-country').value
      });
      userProfile = updated;
      const avatarImg = document.getElementById('avatar-img');
      if (avatarImg && avatarImg.style.display === 'none') {
        document.getElementById('avatar-letter').textContent = (updated.full_name || updated.email || '?')[0].toUpperCase();
      }
      document.getElementById('account-display-name').textContent = updated.full_name || 'User';
      succEl.textContent = t('account_saved') || 'Profile saved!';
      succEl.style.display = 'block';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }
  }

  async function handlePasswordChange(e) {
    e.preventDefault();
    const errEl = document.getElementById('password-error');
    const succEl = document.getElementById('password-success');
    errEl.style.display = 'none';
    succEl.style.display = 'none';

    const newPw = document.getElementById('new-password').value;
    const confirmPw = document.getElementById('confirm-password').value;

    if (newPw !== confirmPw) {
      errEl.textContent = t('auth_password_mismatch') || 'Passwords do not match';
      errEl.style.display = 'block';
      return;
    }

    try {
      const { error } = await sb.auth.updateUser({ password: newPw });
      if (error) throw error;
      succEl.textContent = t('account_password_changed') || 'Password changed!';
      succEl.style.display = 'block';
      document.getElementById('password-form').reset();
      // Recovery режимінде сәтті өзгертілді — баннерді жасыру
      const banner = document.getElementById('recovery-banner');
      if (banner) banner.remove();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }
  }

  // Пароль қалпына келтіру email-нен келгенде — баптаулар бетінің үстіне
  // хабарлама баннері шығады
  function showRecoveryBanner() {
    const settingsSection = document.getElementById('section-settings');
    if (!settingsSection) return;
    // Қолданушы бұрын кірген бе, кірмеген бе — Supabase auth сессиясын hash-тан
    // автоматты түрде оқиды (detectSessionInUrl=true әдепкі мәні).
    // Бірақ кейде сессия әлі жүктелмеуі мүмкін — бірнеше рет тексереміз
    let attempts = 0;
    const tryShow = async () => {
      const user = await getCurrentUser();
      if (user) {
        const msg = t('auth_reset_subtitle') || 'Сілтеме арқылы келдіңіз. Жаңа парольді төменде орнатыңыз.';
        const title = t('auth_reset_title') || 'Жаңа пароль орнату';
        const banner = document.createElement('div');
        banner.id = 'recovery-banner';
        banner.style.cssText = 'background:linear-gradient(135deg,#DBEAFE,#BFDBFE);border:1px solid #93C5FD;border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:0.75rem;';
        banner.innerHTML = `
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1D4ED8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:2px;"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          <div style="flex:1;">
            <strong style="color:#1E3A8A;display:block;margin-bottom:2px;">${escHtml(title)}</strong>
            <span style="color:#1E40AF;font-size:0.9rem;">${escHtml(msg)}</span>
          </div>
        `;
        // Баптаулар бөлімінің ең басына қою
        const h2 = settingsSection.querySelector('h2');
        if (h2) settingsSection.insertBefore(banner, h2.nextSibling);
        else settingsSection.prepend(banner);
        return;
      }
      // Сессия әлі жүктелмеген — тағы күтеміз (ең көбі 5 секунд)
      attempts++;
      if (attempts < 10) setTimeout(tryShow, 500);
      else {
        // Сессия орнамады — қате хабарламасы
        const banner = document.createElement('div');
        banner.id = 'recovery-banner';
        banner.style.cssText = 'background:#FEE2E2;border:1px solid #FCA5A5;border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;';
        banner.innerHTML = `<strong style="color:#991B1B;"><svg class="icon icon-sm" style="vertical-align:middle;color:#991B1B;"><use href="#icon-alert"/></svg> ${t('auth_reset_failed') || 'Сілтеменің мерзімі аяқталған немесе жарамсыз'}</strong>
          <p style="margin:0.5rem 0 0;color:#7F1D1D;font-size:0.9rem;">${t('auth_back_to_login') || 'Кіру бетіне оралу'}: <a href="/auth.html" style="color:#991B1B;font-weight:600;">/auth.html</a></p>`;
        const h2 = settingsSection.querySelector('h2');
        if (h2) settingsSection.insertBefore(banner, h2.nextSibling);
        else settingsSection.prepend(banner);
      }
    };
    tryShow();
  }

  async function handleAccountLogout() {
    await userSignOut();
    window.location.href = '/';
  }

  async function handleDeleteAccount() {
    if (!confirm(t('account_delete_confirm') || 'Are you sure? This cannot be undone.')) return;
    try {
      await sb.from('profiles').delete().eq('id', userProfile.id);
      await sb.auth.signOut();
      window.location.href = '/';
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  async function handleAvatarUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    // Max 2MB
    if (file.size > 2 * 1024 * 1024) {
      alert(t('account_avatar_too_large') || 'Image must be under 2MB');
      return;
    }
    try {
      const url = await uploadAvatar(file);
      document.getElementById('avatar-letter').style.display = 'none';
      const imgEl = document.getElementById('avatar-img');
      imgEl.src = url;
      imgEl.style.display = 'block';
      if (userProfile) userProfile.avatar_url = url;
      // Reload user menu in navbar
      initUserMenu();
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
