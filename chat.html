<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat - SunTrade</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/icons.js"></script>
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    .chat-page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #075E54;
      color: white;
      flex-shrink: 0;
    }
    .chat-page-header .back-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.4rem;
      padding: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
    }
    .chat-page-header .chat-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
    }
    .chat-page-header .chat-info h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 0;
    }
    .chat-page-header .chat-info .status {
      font-size: 0.75rem;
      opacity: 0.85;
    }
    .chat-page-header .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-page-header .lang-pick {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .chat-page-header .lang-pick option { color: #333; }

    .chat-messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #ECE5DD;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-messages-area::-webkit-scrollbar { width: 4px; }
    .chat-messages-area::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    .chat-bubble {
      max-width: 82%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.4;
      position: relative;
      word-wrap: break-word;
    }
    .chat-bubble-in {
      align-self: flex-start;
      background: white;
      border-bottom-left-radius: 4px;
    }
    .chat-bubble-out {
      align-self: flex-end;
      background: #DCF8C6;
      border-bottom-right-radius: 4px;
    }
    .chat-bubble .bubble-time {
      display: block;
      text-align: right;
      font-size: 0.65rem;
      color: #999;
      margin-top: 4px;
    }
    .chat-bubble .bubble-sender {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 2px;
    }

    .chat-welcome-block {
      text-align: center;
      padding: 2rem 1rem;
    }
    .chat-welcome-block .welcome-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .chat-welcome-block h3 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }
    .chat-welcome-block p {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 1rem;
    }
    .chat-quick-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
    }
    .chat-quick-btns button {
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 0.8rem;
      color: var(--primary);
      font-weight: 500;
      cursor: pointer;
    }
    .chat-quick-btns button:active { background: #f0f0f0; }

    .chat-typing-indicator {
      align-self: flex-start;
      background: white;
      padding: 10px 16px;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      display: none;
    }
    .chat-typing-indicator span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #999;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .chat-typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .chat-typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .chat-input-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #F0F0F0;
      flex-shrink: 0;
    }
    .chat-input-bar textarea {
      flex: 1;
      border: none;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      max-height: 100px;
      outline: none;
      background: white;
    }
    .chat-send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #075E54;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .chat-send-btn:active { background: #064D44; }
    .chat-send-btn svg { fill: white; }
  </style>
</head>
<body>

<!-- Header -->
<div class="chat-page-header">
  <a href="/" class="back-btn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
  </a>
  <div class="chat-avatar">S</div>
  <div class="chat-info">
    <h3>SunTrade</h3>
    <div class="status" id="chat-status">Online</div>
  </div>
  <div class="header-actions">
    <select id="chat-lang" class="lang-pick">
      <option value="en">EN</option>
      <option value="ru">RU</option>
      <option value="kz">KZ</option>
      <option value="de">DE</option>
      <option value="fr">FR</option>
      <option value="es">ES</option>
      <option value="tr">TR</option>
      <option value="zh">ZH</option>
      <option value="ar">AR</option>
      <option value="it">IT</option>
      <option value="pt">PT</option>
      <option value="nl">NL</option>
      <option value="pl">PL</option>
      <option value="ja">JA</option>
      <option value="ko">KO</option>
    </select>
  </div>
</div>

<!-- Messages -->
<div class="chat-messages-area" id="chat-messages">
  <div class="chat-welcome-block" id="chat-welcome">
    <div class="welcome-avatar">S</div>
    <h3>SunTrade</h3>
    <p id="welcome-text">Сәлеметсіз бе! Сізге қалай көмектесе аламын?</p>
    <div class="chat-quick-btns">
      <button onclick="sendQuick('Сіздерде қандай тауарлар бар?')">Тауарлар</button>
      <button onclick="sendQuick('Жеткізу қанша тұрады?')">Жеткізу</button>
      <button onclick="sendQuick('Қайтару мүмкін бе?')">Қайтару</button>
    </div>
  </div>
  <div class="chat-typing-indicator" id="typing-indicator">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- Input -->
<div class="chat-input-bar">
  <textarea id="chat-input" rows="1" placeholder="Хабарлама жазыңыз..."
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
  <button class="chat-send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  const STORAGE_KEY = 'suntrade_chat_id';
  const LANG_KEY = 'suntrade_chat_lang';
  const API_BASE = '';

  function getCustomerId() {
    let id = localStorage.getItem(STORAGE_KEY);
    if (!id) {
      id = 'cust_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem(STORAGE_KEY, id);
    }
    return id;
  }

  const customerId = getCustomerId();
  let lastMsgCount = 0;

  // Welcome texts
  const welcomes = {
    kz: 'Сәлеметсіз бе! Сізге қалай көмектесе аламын?',
    ru: 'Здравствуйте! Чем могу помочь?',
    en: 'Hello! How can I help you?',
    de: 'Hallo! Wie kann ich Ihnen helfen?',
    fr: 'Bonjour! Comment puis-je vous aider?',
    es: '¡Hola! ¿En qué puedo ayudarte?',
    tr: 'Merhaba! Size nasıl yardımcı olabilirim?',
    zh: '你好！我能帮您什么？',
    ar: '!مرحبا كيف يمكنني مساعدتك؟',
    it: 'Ciao! Come posso aiutarti?',
    pt: 'Olá! Como posso ajudar?',
    nl: 'Hallo! Hoe kan ik u helpen?',
    pl: 'Cześć! Jak mogę pomóc?',
    ja: 'こんにちは！どのようにお手伝いできますか？',
    ko: '안녕하세요! 무엇을 도와드릴까요?'
  };

  const placeholders = {
    kz: 'Хабарлама жазыңыз...', ru: 'Напишите сообщение...', en: 'Type a message...',
    de: 'Nachricht schreiben...', fr: 'Écrivez un message...', es: 'Escribe un mensaje...',
    tr: 'Mesaj yazın...', zh: '输入消息...', ar: '...اكتب رسالة', it: 'Scrivi un messaggio...',
    pt: 'Escreva uma mensagem...', nl: 'Schrijf een bericht...', pl: 'Napisz wiadomość...',
    ja: 'メッセージを入力...', ko: '메시지를 입력하세요...'
  };

  function initLang() {
    const lang = localStorage.getItem(LANG_KEY) || 'kz';
    document.getElementById('chat-lang').value = lang;
    document.getElementById('welcome-text').textContent = welcomes[lang] || welcomes.en;
    document.getElementById('chat-input').placeholder = placeholders[lang] || placeholders.en;
  }

  document.getElementById('chat-lang').addEventListener('change', function() {
    localStorage.setItem(LANG_KEY, this.value);
    document.getElementById('welcome-text').textContent = welcomes[this.value] || welcomes.en;
    document.getElementById('chat-input').placeholder = placeholders[this.value] || placeholders.en;
  });

  function escHtml(t) {
    if (!t) return '';
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML.replace(/\n/g, '<br>');
  }

  function addBubble(text, dir, sender, time) {
    const welcome = document.getElementById('chat-welcome');
    if (welcome) welcome.style.display = 'none';

    const area = document.getElementById('chat-messages');
    const typing = document.getElementById('typing-indicator');

    const senderHtml = (dir === 'in' && sender) ?
      `<div class="bubble-sender">${sender === 'ai' ? 'AI' : 'Manager'}</div>` : '';

    const bubble = document.createElement('div');
    bubble.className = `chat-bubble chat-bubble-${dir}`;
    bubble.innerHTML = `${senderHtml}${escHtml(text)}<span class="bubble-time">${time}</span>`;

    area.insertBefore(bubble, typing);
    area.scrollTop = area.scrollHeight;
  }

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function showTyping(show) {
    document.getElementById('typing-indicator').style.display = show ? 'block' : 'none';
    const area = document.getElementById('chat-messages');
    area.scrollTop = area.scrollHeight;
  }

  // Load history
  async function loadHistory() {
    try {
      const resp = await fetch(`${API_BASE}/api/chat-messages?customerId=${customerId}`);
      if (!resp.ok) return;
      const data = await resp.json();
      if (!data.messages || !data.messages.length) return;

      data.messages.forEach(m => {
        const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        addBubble(m.original_text, m.direction === 'in' ? 'out' : 'in', m.sender, time);
      });
      lastMsgCount = data.messages.length;

      if (data.conversation && data.conversation.status === 'human') {
        document.getElementById('chat-status').textContent = 'Operator connected';
        document.getElementById('chat-status').style.color = '#FFD700';
      }
    } catch (e) {
      console.error('Load history error:', e);
    }
  }

  // Send message
  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;

    input.value = '';
    input.style.height = 'auto';
    addBubble(msg, 'out', 'customer', getTime());
    showTyping(true);

    try {
      const resp = await fetch(`${API_BASE}/api/chat-message`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ customerId, message: msg })
      });
      const data = await resp.json();
      showTyping(false);

      if (data.reply) {
        addBubble(data.reply, 'in', 'ai', getTime());
      }
      if (data.status === 'human') {
        document.getElementById('chat-status').textContent = 'Operator connected';
        document.getElementById('chat-status').style.color = '#FFD700';
      }
      lastMsgCount += 2;
    } catch (e) {
      showTyping(false);
      addBubble('Error sending message. Please try again.', 'in', '', getTime());
    }
  }

  function sendQuick(text) {
    document.getElementById('chat-input').value = text;
    sendMessage();
  }

  // Polling
  setInterval(async () => {
    try {
      const resp = await fetch(`${API_BASE}/api/chat-messages?customerId=${customerId}`);
      if (!resp.ok) return;
      const data = await resp.json();
      if (data.messages && data.messages.length > lastMsgCount) {
        const newOnes = data.messages.slice(lastMsgCount);
        newOnes.forEach(m => {
          if (m.direction === 'out') {
            addBubble(m.original_text, 'in', m.sender, getTime());
          }
        });
        lastMsgCount = data.messages.length;
      }
    } catch {}
  }, 5000);

  // Auto-resize textarea
  document.getElementById('chat-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  initLang();
  loadHistory();
</script>

</body>
</html>
