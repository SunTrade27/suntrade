<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="auth_title">Sign In - SunTrade</title>
  <link rel="canonical" href="https://www.suntrade.store/auth.html">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="alternate" hreflang="en" href="https://www.suntrade.store/auth.html" />
  <link rel="alternate" hreflang="ru" href="https://www.suntrade.store/auth.html" />
  <link rel="alternate" hreflang="kk" href="https://www.suntrade.store/auth.html" />
  <link rel="alternate" hreflang="x-default" href="https://www.suntrade.store/auth.html" />
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/icons.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="logo">Sun<span>Trade</span></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="/" data-i18n="nav_home">Home</a></li>
      <li><a href="/catalog.html" data-i18n="nav_catalog">Catalog</a></li>
      <li><a href="/cart.html" data-i18n="nav_cart">Cart</a></li>
    </ul>
    <div class="nav-right">
      <div class="lang-wrapper">
        <button id="lang-toggle"><svg class="icon icon-md" style="vertical-align:middle"><use href="#icon-globe"/></svg> EN</button>
        <div id="lang-dropdown"></div>
      </div>
      <a href="/cart.html" class="cart-link">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        <span id="cart-badge">0</span>
      </a>
      <div id="user-menu-container"></div>
      <button class="mobile-menu-btn" onclick="document.getElementById('nav-links').classList.toggle('show')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Sun<span>Trade</span></div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="signin" onclick="switchAuthTab('signin')" data-i18n="auth_signin">Sign In</button>
      <button class="auth-tab" data-tab="signup" onclick="switchAuthTab('signup')" data-i18n="auth_signup">Sign Up</button>
    </div>

    <!-- Sign In Form -->
    <form id="signin-form" onsubmit="handleSignIn(event)">
      <div class="form-group">
        <label data-i18n="auth_email">Email</label>
        <input type="email" id="signin-email" required>
      </div>
      <div class="form-group">
        <label data-i18n="auth_password">Password</label>
        <input type="password" id="signin-password" required minlength="6">
      </div>
      <div class="form-group" style="text-align:right;margin-top:-0.5rem;">
        <a href="#" onclick="event.preventDefault(); switchAuthTab('forgot');" data-i18n="auth_forgot_password" style="color:var(--primary);font-size:0.9rem;text-decoration:none;font-weight:500;">Forgot password?</a>
      </div>
      <p id="signin-error" class="auth-error"></p>
      <button type="submit" class="btn-pay" data-i18n="auth_signin_btn">Sign In</button>
    </form>

    <!-- Forgot Password Form -->
    <form id="forgot-form" style="display:none;" onsubmit="handleForgotPassword(event)">
      <p style="text-align:center;color:var(--text-muted);margin-bottom:1rem;font-size:0.9rem;" data-i18n="auth_forgot_desc">Enter your email and we'll send you a link to reset your password.</p>
      <div class="form-group">
        <label data-i18n="auth_email">Email</label>
        <input type="email" id="forgot-email" required>
      </div>
      <p id="forgot-error" class="auth-error"></p>
      <p id="forgot-success" class="auth-success"></p>
      <button type="submit" class="btn-pay" data-i18n="auth_send_reset_link">Send Reset Link</button>
      <div style="text-align:center;margin-top:1rem;">
        <a href="#" onclick="event.preventDefault(); switchAuthTab('signin');" data-i18n="auth_back_to_signin" style="color:var(--text-muted);font-size:0.9rem;text-decoration:none;">← Back to Sign In</a>
      </div>
    </form>

    <!-- Reset Password Form (used when user clicks the link in the email) -->
    <form id="reset-form" style="display:none;" onsubmit="handleResetPassword(event)">
      <p style="text-align:center;color:var(--text-muted);margin-bottom:1rem;font-size:0.9rem;" data-i18n="auth_reset_desc">Enter your new password below.</p>
      <div class="form-group">
        <label data-i18n="auth_new_password">New Password</label>
        <input type="password" id="reset-password" required minlength="6">
      </div>
      <div class="form-group">
        <label data-i18n="auth_confirm_password">Confirm Password</label>
        <input type="password" id="reset-confirm" required minlength="6">
      </div>
      <p id="reset-error" class="auth-error"></p>
      <p id="reset-success" class="auth-success"></p>
      <button type="submit" class="btn-pay" data-i18n="auth_reset_password_btn">Reset Password</button>
    </form>

    <!-- Sign Up Form -->
    <form id="signup-form" style="display:none;" onsubmit="handleSignUp(event)">
      <div class="form-group">
        <label data-i18n="auth_full_name">Full Name</label>
        <input type="text" id="signup-name" required>
      </div>
      <div class="form-group">
        <label data-i18n="auth_email">Email</label>
        <input type="email" id="signup-email" required>
      </div>
      <div class="form-group">
        <label><svg class="icon icon-sm" style="vertical-align:middle;margin-right:4px;"><use href="#icon-globe"/></svg> <span data-i18n="auth_country">Country / Ел / Страна</span></label>
        <select id="signup-country" required>
          <option value="">--</option>
          <option value="KZ" data-lang="kz">🇰🇿 Қазақстан</option>
          <option value="RU" data-lang="ru">🇷🇺 Россия</option>
          <option value="GB" data-lang="en">🇬🇧 United Kingdom</option>
          <option value="DE" data-lang="de">🇩🇪 Deutschland</option>
          <option value="FR" data-lang="fr">🇫🇷 France</option>
          <option value="ES" data-lang="es">🇪🇸 España</option>
          <option value="IT" data-lang="it">🇮🇹 Italia</option>
          <option value="TR" data-lang="tr">🇹🇷 Türkiye</option>
          <option value="PT" data-lang="pt">🇵🇹 Portugal</option>
          <option value="NL" data-lang="nl">🇳🇱 Nederland</option>
          <option value="PL" data-lang="pl">🇵🇱 Polska</option>
          <option value="SA" data-lang="ar">🇸🇦 العربية</option>
        </select>
      </div>
      <div class="form-group">
        <label data-i18n="auth_password">Password</label>
        <input type="password" id="signup-password" required minlength="6">
      </div>
      <div class="form-group">
        <label data-i18n="auth_confirm_password">Confirm Password</label>
        <input type="password" id="signup-confirm" required minlength="6">
      </div>
      <p id="signup-error" class="auth-error"></p>
      <p id="signup-success" class="auth-success"></p>
      <button type="submit" class="btn-pay" data-i18n="auth_signup_btn">Sign Up</button>
    </form>
  </div>
</div>

<script src="/js/i18n.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/user-menu.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    initSupabase();
    setTimeout(async () => {
      if (!sb) return;
      const user = await getCurrentUser();
      if (user) window.location.href = '/account.html';
    }, 500);

    // If ?mode=signup, switch to sign up tab
    // If ?mode=reset, switch to reset password tab (user clicked link in email)
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode');
    if (mode === 'signup') {
      switchAuthTab('signup');
    } else if (mode === 'reset') {
      // Wait a bit for Supabase to detect the recovery session from the URL hash
      setTimeout(() => switchAuthTab('reset'), 600);
    } else if (mode === 'forgot') {
      switchAuthTab('forgot');
    }
  });

  function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('signin-form').style.display = tab === 'signin' ? 'block' : 'none';
    document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
    const forgotForm = document.getElementById('forgot-form');
    const resetForm = document.getElementById('reset-form');
    if (forgotForm) forgotForm.style.display = tab === 'forgot' ? 'block' : 'none';
    if (resetForm) resetForm.style.display = tab === 'reset' ? 'block' : 'none';
    // Hide tab buttons on forgot/reset views
    const tabsContainer = document.querySelector('.auth-tabs');
    if (tabsContainer) tabsContainer.style.display = (tab === 'forgot' || tab === 'reset') ? 'none' : 'flex';
    const activeTab = document.querySelector(`.auth-tab[data-tab="${tab}"]`);
    if (activeTab) activeTab.classList.add('active');
    document.getElementById('signin-error').style.display = 'none';
    document.getElementById('signup-error').style.display = 'none';
    document.getElementById('signup-success').style.display = 'none';
    const forgotErr = document.getElementById('forgot-error');
    const forgotSucc = document.getElementById('forgot-success');
    if (forgotErr) forgotErr.style.display = 'none';
    if (forgotSucc) forgotSucc.style.display = 'none';
    const resetErr = document.getElementById('reset-error');
    const resetSucc = document.getElementById('reset-success');
    if (resetErr) resetErr.style.display = 'none';
    if (resetSucc) resetSucc.style.display = 'none';
  }

  async function handleSignIn(e) {
    e.preventDefault();
    const errEl = document.getElementById('signin-error');
    errEl.style.display = 'none';
    try {
      await userSignIn(
        document.getElementById('signin-email').value,
        document.getElementById('signin-password').value
      );
      window.location.href = '/account.html';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }
  }

  async function handleSignUp(e) {
    e.preventDefault();
    const errEl = document.getElementById('signup-error');
    const succEl = document.getElementById('signup-success');
    errEl.style.display = 'none';
    succEl.style.display = 'none';

    const password = document.getElementById('signup-password').value;
    const confirm = document.getElementById('signup-confirm').value;
    if (password !== confirm) {
      errEl.textContent = t('auth_password_mismatch');
      errEl.style.display = 'block';
      return;
    }

    try {
      const countrySelect = document.getElementById('signup-country');
      const selectedOption = countrySelect.options[countrySelect.selectedIndex];
      const selectedLang = selectedOption?.dataset?.lang || currentLang;
      await userSignUp(
        document.getElementById('signup-email').value,
        password,
        document.getElementById('signup-name').value,
        selectedLang,
        {
          country: document.getElementById('signup-country').value
        }
      );
      succEl.textContent = t('auth_check_email');
      succEl.style.display = 'block';
      document.getElementById('signup-form').reset();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }
  }

  async function handleForgotPassword(e) {
    e.preventDefault();
    const errEl = document.getElementById('forgot-error');
    const succEl = document.getElementById('forgot-success');
    errEl.style.display = 'none';
    succEl.style.display = 'none';
    try {
      const email = document.getElementById('forgot-email').value.trim();
      await resetPassword(email);
      succEl.textContent = t('auth_reset_link_sent');
      succEl.style.display = 'block';
      document.getElementById('forgot-form').reset();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }
  }

  async function handleResetPassword(e) {
    e.preventDefault();
    const errEl = document.getElementById('reset-error');
    const succEl = document.getElementById('reset-success');
    errEl.style.display = 'none';
    succEl.style.display = 'none';

    const password = document.getElementById('reset-password').value;
    const confirm = document.getElementById('reset-confirm').value;
    if (password !== confirm) {
      errEl.textContent = t('auth_password_mismatch');
      errEl.style.display = 'block';
      return;
    }

    try {
      await updatePassword(password);
      succEl.textContent = t('auth_password_updated');
      succEl.style.display = 'block';
      document.getElementById('reset-form').reset();
      // Redirect to account after a short delay
      setTimeout(() => { window.location.href = '/account.html'; }, 2000);
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }
  }
</script>
</body>
</html>
