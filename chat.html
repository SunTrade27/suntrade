<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - SunTrade</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <script src="/js/icons.js"></script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    body { display: flex; flex-direction: column; background: #ECE5DD; }
    .navbar { flex-shrink: 0; }

    .chat-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      background: var(--primary);
      color: white; flex-shrink: 0;
    }
    .chat-header .chat-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--primary-dark);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.95rem; flex-shrink: 0;
    }
    .chat-header .chat-info h3 { font-size: 0.95rem; font-weight: 600; margin: 0; }
    .chat-header .chat-info .status { font-size: 0.75rem; opacity: 0.85; }
    .chat-header .lang-pick {
      margin-left: auto;
      background: rgba(255,255,255,0.2); border: none; color: white;
      padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 600;
    }
    .chat-header .lang-pick option { color: #333; }

    .chat-body {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 12px; display: flex; flex-direction: column; gap: 6px;
    }

    .bubble {
      max-width: 80%; padding: 8px 12px; border-radius: 12px;
      font-size: 0.88rem; line-height: 1.35; word-wrap: break-word;
    }
    .bubble-in { align-self: flex-start; background: white; border-bottom-left-radius: 4px; }
    .bubble-out { align-self: flex-end; background: #DCF8C6; border-bottom-right-radius: 4px; }
    .bubble .b-time { display: block; text-align: right; font-size: 0.6rem; color: #999; margin-top: 3px; }

    .chat-welcome { text-align: center; padding: 1.5rem 1rem; }
    .chat-welcome .w-logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .chat-welcome .w-logo span { color: var(--primary); }
    .chat-welcome p { font-size: 0.85rem; color: #666; margin-bottom: 1rem; }
    .quick-btns { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
    .quick-btns button {
      background: white; border: 1px solid var(--border);
      border-radius: 20px; padding: 8px 16px; font-size: 0.8rem;
      color: var(--primary); font-weight: 500; cursor: pointer;
    }

    .typing-dots {
      align-self: flex-start; background: white;
      padding: 10px 16px; border-radius: 12px; border-bottom-left-radius: 4px;
      display: none;
    }
    .typing-dots span {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: #999; margin: 0 2px;
      animation: dotB 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotB { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    .chat-input-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: #F0F0F0;
      flex-shrink: 0; border-top: 1px solid #ddd;
    }
    #chat-input {
      flex: 1; border: 1px solid #ddd; border-radius: 20px;
      padding: 10px 16px; font-size: 16px; font-family: inherit;
      resize: none; max-height: 100px; outline: none; background: white;
      -webkit-appearance: none; appearance: none;
    }
    #chat-input:focus { border-color: var(--primary); }
    .send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--primary); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .send-btn:active { background: var(--primary-dark); }
    .send-btn svg { fill: white; }

    .operator-banner {
      align-self: center; background: var(--primary); color: white;
      padding: 6px 16px; border-radius: 20px; font-size: 0.75rem;
      font-weight: 600; display: none;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="logo">Sun<span>Trade</span></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="/" data-i18n="nav_home">Home</a></li>
      <li><a href="/catalog.html" data-i18n="nav_catalog">Catalog</a></li>
      <li><a href="/cart.html" data-i18n="nav_cart">Cart</a></li>
    </ul>
    <div class="nav-right">
      <a href="/cart.html" class="cart-link">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
      </a>
      <button class="mobile-menu-btn" onclick="document.getElementById('nav-links').classList.toggle('show')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>
</nav>

<div class="chat-header">
  <div class="chat-avatar">S</div>
  <div class="chat-info">
    <h3>SunTrade</h3>
    <div class="status" id="chat-status">Онлайн</div>
  </div>
  <select id="chat-lang" class="lang-pick">
    <option value="kz">KZ</option>
    <option value="ru">RU</option>
    <option value="en">EN</option>
    <option value="de">DE</option>
    <option value="fr">FR</option>
    <option value="es">ES</option>
    <option value="tr">TR</option>
    <option value="zh">ZH</option>
  </select>
</div>

<div class="chat-body" id="chat-body">
  <div class="chat-welcome" id="chat-welcome">
    <div class="w-logo">Sun<span>Trade</span></div>
    <p id="welcome-text">Сәлеметсіз бе! Сізге қалай көмектесе аламын?</p>
    <div class="quick-btns">
      <button onclick="window.doQuick('Сіздерде қандай тауарлар бар?')">Тауарлар</button>
      <button onclick="window.doQuick('Жеткізу қанша тұрады?')">Жеткізу</button>
      <button onclick="window.doQuick('Қайтару мүмкін бе?')">Қайтару</button>
      <button onclick="window.doQuick('Операторға қосыңыз')">Оператор</button>
    </div>
  </div>
  <div class="operator-banner" id="op-banner">Операторге қосылды</div>
  <div class="typing-dots" id="typing-dots"><span></span><span></span><span></span></div>
</div>

<div class="chat-input-bar">
  <textarea id="chat-input" rows="1" placeholder="Хабарлама жазыңыз..."></textarea>
  <button class="send-btn" id="send-btn" type="button">
    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
(function() {
  var STORAGE_KEY = 'suntrade_chat_id';
  var LANG_KEY = 'suntrade_chat_lang';

  function getCustomerId() {
    var id = localStorage.getItem(STORAGE_KEY);
    if (!id) {
      id = 'cust_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem(STORAGE_KEY, id);
    }
    return id;
  }

  var customerId = getCustomerId();
  var lastMsgCount = 0;

  var welcomes = {
    kz: 'Сәлеметсіз бе! Сізге қалай көмектесе аламын?',
    ru: 'Здравствуйте! Чем могу помочь?',
    en: 'Hello! How can I help you?',
    de: 'Hallo! Wie kann ich helfen?',
    fr: 'Bonjour! Comment puis-je aider?',
    es: '¡Hola! ¿En qué puedo ayudar?',
    tr: 'Merhaba! Nasıl yardımcı olabilirim?',
    zh: '你好！我能帮您什么？'
  };
  var placeholders = {
    kz: 'Хабарлама жазыңыз...', ru: 'Напишите сообщение...', en: 'Type a message...',
    de: 'Nachricht schreiben...', fr: 'Écrivez un message...', es: 'Escribe un mensaje...',
    tr: 'Mesaj yazın...', zh: '输入消息...'
  };

  var body = document.getElementById('chat-body');
  var input = document.getElementById('chat-input');
  var sendBtn = document.getElementById('send-btn');
  var welcome = document.getElementById('chat-welcome');
  var typing = document.getElementById('typing-dots');
  var status = document.getElementById('chat-status');
  var langSel = document.getElementById('chat-lang');
  var opBanner = document.getElementById('op-banner');

  function esc(t) {
    if (!t) return '';
    var d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML.replace(/\n/g, '<br>');
  }
  function time() {
    return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  }
  function addBubble(text, dir) {
    if (welcome) welcome.style.display = 'none';
    var b = document.createElement('div');
    b.className = 'bubble bubble-' + dir;
    b.innerHTML = esc(text) + '<span class="b-time">' + time() + '</span>';
    body.insertBefore(b, opBanner.nextSibling ? opBanner : typing);
    body.scrollTop = body.scrollHeight;
  }
  function showTyping(v) {
    typing.style.display = v ? 'block' : 'none';
    body.scrollTop = body.scrollHeight;
  }

  function initLang() {
    var l = localStorage.getItem(LANG_KEY) || 'kz';
    langSel.value = l;
    var wp = document.getElementById('welcome-text');
    if (wp) wp.textContent = welcomes[l] || welcomes.en;
    input.placeholder = placeholders[l] || placeholders.en;
  }
  langSel.addEventListener('change', function() {
    localStorage.setItem(LANG_KEY, this.value);
    var wp = document.getElementById('welcome-text');
    if (wp) wp.textContent = welcomes[this.value] || welcomes.en;
    input.placeholder = placeholders[this.value] || placeholders.en;
  });

  async function send() {
    var msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    input.style.height = 'auto';
    addBubble(msg, 'out');
    showTyping(true);

    try {
      var resp = await fetch('/api/chat?action=message', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({customerId: customerId, message: msg})
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      var data = await resp.json();
      showTyping(false);

      if (data.status === 'human') {
        opBanner.style.display = 'block';
        status.textContent = 'Оператор қосылды';
        status.style.color = '#FFD700';
      }
      if (data.reply) {
        addBubble(data.reply, 'in');
      }
      lastMsgCount += 2;
    } catch(e) {
      showTyping(false);
      console.error('Chat error:', e);
      addBubble('Қате шықты. Қайта көріңіз.', 'in');
    }
  }

  window.doQuick = function(t) { input.value = t; send(); };

  sendBtn.addEventListener('click', function(e) { e.preventDefault(); send(); });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  async function loadHistory() {
    try {
      var resp = await fetch('/api/chat?action=messages&customerId=' + encodeURIComponent(customerId));
      if (!resp.ok) return;
      var data = await resp.json();
      if (!data.messages || !data.messages.length) return;
      data.messages.forEach(function(m) {
        addBubble(m.original_text, m.direction === 'in' ? 'out' : 'in');
      });
      lastMsgCount = data.messages.length;
      if (data.conversation && data.conversation.status === 'human') {
        opBanner.style.display = 'block';
        status.textContent = 'Оператор қосылды';
      }
    } catch(e) { console.error('History error:', e); }
  }

  setInterval(async function() {
    try {
      var resp = await fetch('/api/chat?action=messages&customerId=' + encodeURIComponent(customerId));
      if (!resp.ok) return;
      var data = await resp.json();
      if (data.messages && data.messages.length > lastMsgCount) {
        data.messages.slice(lastMsgCount).forEach(function(m) {
          if (m.direction === 'out') addBubble(m.original_text, 'in');
        });
        lastMsgCount = data.messages.length;
      }
    } catch(e) {}
  }, 5000);

  initLang();
  loadHistory();
})();
</script>

</body>
</html>
