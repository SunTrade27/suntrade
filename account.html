<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="account_title">My Account - SunTrade</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/icons.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="logo">Sun<span>Trade</span></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="/" data-i18n="nav_home">Home</a></li>
      <li><a href="/catalog.html" data-i18n="nav_catalog">Catalog</a></li>
      <li><a href="/cart.html" data-i18n="nav_cart">Cart</a></li>
    </ul>
    <div class="nav-right">
      <div class="lang-wrapper">
        <button id="lang-toggle"><svg class="icon icon-md" style="vertical-align:middle"><use href="#icon-globe"/></svg> EN</button>
        <div id="lang-dropdown"></div>
      </div>
      <a href="/cart.html" class="cart-link">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        <span id="cart-badge">0</span>
      </a>
      <div id="user-menu-container"></div>
      <button class="mobile-menu-btn" onclick="document.getElementById('nav-links').classList.toggle('show')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>
</nav>

<!-- LOADING -->
<div id="account-loading" style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
  <div class="spinner"></div>
</div>

<!-- NOT LOGGED IN -->
<div id="account-not-logged" style="display:none;text-align:center;padding:4rem 1rem;">
  <svg class="icon icon-xxl" style="color:var(--text-muted);margin-bottom:1rem;"><use href="#icon-user"/></svg>
  <h2 data-i18n="auth_signin_required">Please sign in to view your account</h2>
  <a href="/auth.html" class="btn-pay" style="display:inline-block;margin-top:1rem;" data-i18n="auth_signin">Sign In</a>
</div>

<!-- ACCOUNT PANEL -->
<div id="account-panel" class="account-layout" style="display:none;">

  <!-- Sidebar -->
  <aside class="account-sidebar">
    <div class="account-avatar" id="account-avatar" style="position:relative;cursor:pointer;" onclick="document.getElementById('avatar-upload-input').click();">
      <span id="avatar-letter">?</span>
      <img id="avatar-img" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;position:absolute;top:0;left:0;">
      <div class="avatar-overlay" id="avatar-overlay">
        <svg class="icon icon-md" style="color:white;"><use href="#icon-camera"/></svg>
      </div>
    </div>
    <input type="file" id="avatar-upload-input" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)">
    <h3 id="account-display-name">User</h3>
    <p id="account-display-email" style="color:var(--text-light);font-size:0.85rem;">-</p>
    <nav class="account-nav">
      <a href="#" class="active" onclick="showAccountSection('profile')" data-i18n="account_profile">Profile</a>
      <a href="#" onclick="showAccountSection('orders')" data-i18n="account_orders">My Orders</a>
      <a href="#" onclick="showAccountSection('settings')" data-i18n="account_settings">Settings</a>
      <a href="#" id="account-admin-link" style="display:none;" onclick="showAccountSection('admin')" data-i18n="nav_admin">Admin Panel</a>
      <a href="#" onclick="handleAccountLogout()" data-i18n="auth_logout">Logout</a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="account-main">
    <!-- Profile Section -->
    <div id="section-profile">
      <h2 data-i18n="account_profile">Profile</h2>
      <form id="profile-form" onsubmit="handleSaveProfile(event)" style="margin-top:1.5rem;">
        <div class="form-row">
          <div class="form-group">
            <label data-i18n="auth_full_name">Full Name</label>
            <input type="text" id="profile-name">
          </div>
          <div class="form-group">
            <label data-i18n="auth_email">Email</label>
            <input type="email" id="profile-email" readonly style="background:#f5f5f5;">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label data-i18n="checkout_phone">Phone Number</label>
            <input type="tel" id="profile-phone">
          </div>
          <div class="form-group">
            <label data-i18n="checkout_country">Country</label>
            <input type="text" id="profile-country">
          </div>
        </div>
        <div class="form-group">
          <label data-i18n="checkout_address">Shipping Address</label>
          <input type="text" id="profile-address">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label data-i18n="checkout_city">City</label>
            <input type="text" id="profile-city">
          </div>
          <div class="form-group">
            <label data-i18n="checkout_zip">ZIP Code</label>
            <input type="text" id="profile-zip">
          </div>
        </div>
        <p id="profile-success" class="auth-success"></p>
        <p id="profile-error" class="auth-error"></p>
        <button type="submit" class="btn-pay" style="max-width:200px;" data-i18n="account_save">Save Changes</button>
      </form>
    </div>

    <!-- Orders Section -->
    <div id="section-orders" style="display:none;">
      <h2 data-i18n="account_orders">My Orders</h2>
      <div id="user-orders-table" style="margin-top:1.5rem;"></div>
    </div>

    <!-- Settings Section -->
    <div id="section-settings" style="display:none;">
      <h2 data-i18n="account_settings">Settings</h2>
      <div style="margin-top:1.5rem;">
        <div style="background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;">
          <h3 data-i18n="account_change_password" style="margin-bottom:1rem;">Change Password</h3>
          <form id="password-form" onsubmit="handlePasswordChange(event)">
            <div class="form-group">
              <label data-i18n="account_new_password">New Password</label>
              <input type="password" id="new-password" minlength="6">
            </div>
            <div class="form-group">
              <label data-i18n="auth_confirm_password">Confirm Password</label>
              <input type="password" id="confirm-password" minlength="6">
            </div>
            <p id="password-error" class="auth-error"></p>
            <p id="password-success" class="auth-success"></p>
            <button type="submit" class="btn-pay" style="max-width:200px;" data-i18n="account_change_password_btn">Change Password</button>
          </form>
        </div>
        <div style="background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;">
          <h3 style="color:var(--danger);margin-bottom:1rem;" data-i18n="account_danger_zone">Danger Zone</h3>
          <button class="btn-sm btn-danger" onclick="handleDeleteAccount()" data-i18n="account_delete">Delete Account</button>
        </div>
      </div>
    </div>

    <!-- Admin Section -->
    <div id="section-admin" style="display:none;">
      <h2 data-i18n="nav_admin">Admin Panel</h2>
      <div style="margin-top:1.5rem;">
        <!-- Add Product Form -->
        <div style="background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem;">
          <h3 data-i18n="admin_add_product" style="margin-bottom:1rem;">Add New Product</h3>
          <form id="admin-product-form" onsubmit="handleAddProduct(event)">
            <div class="form-row">
              <div class="form-group">
                <label>Product Name (EN) *</label>
                <input type="text" id="prod-name-en" required>
              </div>
              <div class="form-group">
                <label>Product Name (KZ)</label>
                <input type="text" id="prod-name-kz">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Product Name (RU)</label>
                <input type="text" id="prod-name-ru">
              </div>
              <div class="form-group">
                <label data-i18n="admin_price">Price (€) *</label>
                <input type="number" id="prod-price" step="0.01" min="0" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label data-i18n="admin_stock">Stock</label>
                <input type="number" id="prod-stock" min="0" value="0">
              </div>
              <div class="form-group">
                <label data-i18n="admin_category">Category</label>
                <select id="prod-category"></select>
              </div>
            </div>
            <div class="form-group">
              <label>Description (EN)</label>
              <textarea id="prod-desc-en" rows="3"></textarea>
            </div>
            <div class="form-group">
              <label>Product Images * (first image = main)</label>
              <div id="prod-images-preview" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.5rem;"></div>
              <input type="file" id="prod-images-input" accept="image/*" multiple onchange="handleProductImagesSelect(event)">
              <p style="font-size:0.8rem;color:var(--text-muted);margin-top:0.25rem;">Background will be automatically removed using AI</p>
            </div>
            <p id="admin-product-error" class="auth-error"></p>
            <p id="admin-product-success" class="auth-success"></p>
            <button type="submit" class="btn-pay" style="max-width:200px;" data-i18n="admin_add_btn">Add Product</button>
          </form>
        </div>

        <!-- Products List -->
        <div style="background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;">
          <h3 style="margin-bottom:1rem;">Products</h3>
          <div id="admin-products-list"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/js/i18n.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/user-menu.js"></script>
<script>
  let userProfile = null;

  document.addEventListener('DOMContentLoaded', async () => {
    setTimeout(async () => {
      if (!sb) {
        document.getElementById('account-loading').style.display = 'none';
        document.getElementById('account-not-logged').style.display = 'block';
        return;
      }

      const user = await getCurrentUser();
      if (!user) {
        document.getElementById('account-loading').style.display = 'none';
        document.getElementById('account-not-logged').style.display = 'block';
        return;
      }

      userProfile = await getUserProfile();
      document.getElementById('account-loading').style.display = 'none';
      document.getElementById('account-panel').style.display = 'grid';

      // Fill profile data
      if (userProfile) {
        const displayName = userProfile.full_name || 'User';
        const displayEmail = userProfile.email || user.email || '';
        const avatarUrl = userProfile.avatar_url || '';

        // Avatar
        if (avatarUrl) {
          document.getElementById('avatar-letter').style.display = 'none';
          const imgEl = document.getElementById('avatar-img');
          imgEl.src = avatarUrl;
          imgEl.style.display = 'block';
        } else {
          document.getElementById('avatar-letter').textContent = (userProfile.full_name || displayEmail || '?')[0].toUpperCase();
        }

        document.getElementById('account-display-name').textContent = displayName;
        document.getElementById('account-display-email').textContent = displayEmail;
        document.getElementById('profile-name').value = userProfile.full_name || '';
        document.getElementById('profile-email').value = displayEmail;
        document.getElementById('profile-phone').value = userProfile.phone || '';
        document.getElementById('profile-address').value = userProfile.address || '';
        document.getElementById('profile-city').value = userProfile.city || '';
        document.getElementById('profile-country').value = userProfile.country || '';
        document.getElementById('profile-zip').value = userProfile.zip || '';

        // Show admin link if admin
        if (userProfile.is_admin) {
          document.getElementById('account-admin-link').style.display = 'block';
        }
      }
    }, 500);
  });

  function showAccountSection(name) {
    ['profile', 'orders', 'settings', 'admin'].forEach(s => {
      const el = document.getElementById('section-' + s);
      if (el) el.style.display = s === name ? 'block' : 'none';
    });
    document.querySelectorAll('.account-nav a').forEach(a => a.classList.remove('active'));
    event.target.classList.add('active');
    if (name === 'orders') loadUserOrders();
    if (name === 'admin') loadAdminPanel();
  }

  async function loadUserOrders() {
    const orders = await getUserOrders();
    const container = document.getElementById('user-orders-table');
    if (orders.length === 0) {
      container.innerHTML = '<p style="color:var(--text-light);">' + (t('account_no_orders') || 'No orders yet.') + '</p>';
      return;
    }
    container.innerHTML = `
      <table class="admin-table">
        <thead><tr><th>ID</th><th>Product</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>${orders.map(o => `
          <tr>
            <td>${o.id.substring(0, 8)}...</td>
            <td>${(o.products && o.products['name_' + currentLang]) || (o.products && o.products.name_en) || 'N/A'}</td>
            <td>&euro;${parseFloat(o.amount || 0).toFixed(2)}</td>
            <td><span class="status-badge status-${o.status}">${t('admin_status_' + o.status) || o.status}</span></td>
            <td>${new Date(o.created_at).toLocaleDateString()}</td>
          </tr>
        `).join('')}</tbody>
      </table>
    `;
  }

  async function handleSaveProfile(e) {
    e.preventDefault();
    const errEl = document.getElementById('profile-error');
    const succEl = document.getElementById('profile-success');
    errEl.style.display = 'none';
    succEl.style.display = 'none';

    try {
      const updated = await updateUserProfile({
        full_name: document.getElementById('profile-name').value,
        phone: document.getElementById('profile-phone').value,
        address: document.getElementById('profile-address').value,
        city: document.getElementById('profile-city').value,
        country: document.getElementById('profile-country').value,
        zip: document.getElementById('profile-zip').value
      });
      userProfile = updated;
      const avatarImg = document.getElementById('avatar-img');
      if (avatarImg && avatarImg.style.display === 'none') {
        document.getElementById('avatar-letter').textContent = (updated.full_name || updated.email || '?')[0].toUpperCase();
      }
      document.getElementById('account-display-name').textContent = updated.full_name || 'User';
      succEl.textContent = t('account_saved') || 'Profile saved!';
      succEl.style.display = 'block';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }
  }

  async function handlePasswordChange(e) {
    e.preventDefault();
    const errEl = document.getElementById('password-error');
    const succEl = document.getElementById('password-success');
    errEl.style.display = 'none';
    succEl.style.display = 'none';

    const newPw = document.getElementById('new-password').value;
    const confirmPw = document.getElementById('confirm-password').value;

    if (newPw !== confirmPw) {
      errEl.textContent = t('auth_password_mismatch') || 'Passwords do not match';
      errEl.style.display = 'block';
      return;
    }

    try {
      const { error } = await sb.auth.updateUser({ password: newPw });
      if (error) throw error;
      succEl.textContent = t('account_password_changed') || 'Password changed!';
      succEl.style.display = 'block';
      document.getElementById('password-form').reset();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }
  }

  async function handleAccountLogout() {
    await userSignOut();
    window.location.href = '/';
  }

  async function handleDeleteAccount() {
    if (!confirm(t('account_delete_confirm') || 'Are you sure? This cannot be undone.')) return;
    try {
      await sb.from('profiles').delete().eq('id', userProfile.id);
      await sb.auth.signOut();
      window.location.href = '/';
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  async function handleAvatarUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    // Max 2MB
    if (file.size > 2 * 1024 * 1024) {
      alert(t('account_avatar_too_large') || 'Image must be under 2MB');
      return;
    }
    try {
      const url = await uploadAvatar(file);
      document.getElementById('avatar-letter').style.display = 'none';
      const imgEl = document.getElementById('avatar-img');
      imgEl.src = url;
      imgEl.style.display = 'block';
      if (userProfile) userProfile.avatar_url = url;
      // Reload user menu in navbar
      initUserMenu();
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  // Admin Panel Functions
  let adminSelectedImages = [];

  async function loadAdminPanel() {
    if (!userProfile || !userProfile.is_admin) return;
    // Load categories
    const categories = await getCategories();
    const catSelect = document.getElementById('prod-category');
    if (catSelect) {
      catSelect.innerHTML = '<option value="">-- Select --</option>' +
        categories.map(c => `<option value="${c.id}">${c['name_' + currentLang] || c.name_en || 'Category'}</option>`).join('');
    }
    // Load products list
    loadAdminProducts();
  }

  async function loadAdminProducts() {
    const container = document.getElementById('admin-products-list');
    if (!container) return;
    const products = await adminGetProducts();
    if (products.length === 0) {
      container.innerHTML = '<p style="color:var(--text-light);">No products yet.</p>';
      return;
    }
    container.innerHTML = `
      <table class="admin-table" style="width:100%;">
        <thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead>
        <tbody>${products.map(p => {
          const img = p.images && p.images[0] ? p.images[0] : '/images/placeholder.jpg';
          const name = p['name_' + currentLang] || p.name_en || 'Product';
          return `<tr>
            <td><img src="${img}" style="width:50px;height:50px;object-fit:cover;border-radius:6px;"></td>
            <td>${escHtml(name)}</td>
            <td>€${parseFloat(p.price).toFixed(2)}</td>
            <td>${p.stock}</td>
            <td>
              <button class="btn-sm btn-outline" onclick="editProduct('${p.id}')">Edit</button>
              <button class="btn-sm btn-danger" onclick="deleteProduct('${p.id}')">Delete</button>
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    `;
  }

  function handleProductImagesSelect(e) {
    const files = Array.from(e.target.files);
    adminSelectedImages = files;
    const preview = document.getElementById('prod-images-preview');
    preview.innerHTML = '';
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        preview.innerHTML += `<img src="${ev.target.result}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;">`;
      };
      reader.readAsDataURL(file);
    });
  }

  async function handleAddProduct(e) {
    e.preventDefault();
    const errEl = document.getElementById('admin-product-error');
    const succEl = document.getElementById('admin-product-success');
    errEl.style.display = 'none';
    succEl.style.display = 'none';

    if (adminSelectedImages.length === 0) {
      errEl.textContent = 'Please select at least one image';
      errEl.style.display = 'block';
      return;
    }

    try {
      // Upload images with background removal
      const imageUrls = [];
      for (const file of adminSelectedImages) {
        // Upload original first
        const originalUrl = await uploadImage(file);
        // Try to remove background using AI
        try {
          const cleanUrl = await removeBackground(originalUrl);
          imageUrls.push(cleanUrl);
        } catch (bgErr) {
          console.warn('Background removal failed, using original:', bgErr);
          imageUrls.push(originalUrl);
        }
      }

      // Create product
      await adminAddProduct({
        name_en: document.getElementById('prod-name-en').value,
        name_kz: document.getElementById('prod-name-kz').value,
        name_ru: document.getElementById('prod-name-ru').value,
        desc_en: document.getElementById('prod-desc-en').value,
        price: parseFloat(document.getElementById('prod-price').value),
        stock: parseInt(document.getElementById('prod-stock').value) || 0,
        category_id: document.getElementById('prod-category').value || null,
        images: imageUrls
      });

      succEl.textContent = 'Product added successfully!';
      succEl.style.display = 'block';
      document.getElementById('admin-product-form').reset();
      document.getElementById('prod-images-preview').innerHTML = '';
      adminSelectedImages = [];
      loadAdminProducts();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }
  }

  async function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    try {
      await sb.from('products').delete().eq('id', id);
      loadAdminProducts();
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
